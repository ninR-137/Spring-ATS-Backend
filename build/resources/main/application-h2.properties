# H2 database configuration
spring.datasource.url=jdbc:h2:mem:notetaking;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Enable H2 console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Keep existing app settings
security.jwt.secret-key=${JWT_SECRET_KEY:default_dev_jwt_secret}
security.jwt.expiration-time=3600000

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SUPPORT_EMAIL}
spring.mail.password=${APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.resume.storage-root=uploads/resumes
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

meeting.provider=${MEETING_PROVIDER:zoom}
meeting.api.key=${MEETING_API_KEY:}
meeting.api.secret=${MEETING_API_SECRET:}
meeting.default.duration=60
meeting.default.timezone=America/New_York

email.reminders.enabled=true
email.reminders.24h=true
email.reminders.1h=true
email.calendar.provider=${EMAIL_CALENDAR_PROVIDER:google}

spring.config.import=optional:file:.env[.properties]
