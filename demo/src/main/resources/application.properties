# Database configuration
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT secret key
security.jwt.secret-key=${JWT_SECRET_KEY}
security.jwt.expiration-time=3600000
#
# Mail properties
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SUPPORT_EMAIL}
spring.mail.password=${APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.resume.storage-root=uploads/resumes
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

meeting.provider=${MEETING_PROVIDER:jitsi}
meeting.api.key=${MEETING_API_KEY:}
meeting.api.secret=${MEETING_API_SECRET:}
meeting.default.duration=60
meeting.default.timezone=America/New_York

email.reminders.enabled=true
email.reminders.24h=true
email.reminders.1h=true
email.calendar.provider=${EMAIL_CALENDAR_PROVIDER:google}

spring.config.import=optional:file:.env[.properties]
