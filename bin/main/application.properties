# H2 in-memory database configuration for testing
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# JWT secret key (fallback when JWT_SECRET_KEY is not provided)
security.jwt.secret-key=${JWT_SECRET_KEY:default_dev_jwt_secret}
security.jwt.expiration-time=3600000

# Mail properties (kept from original)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SUPPORT_EMAIL}
spring.mail.password=${APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Enable H2 console for debugging during development
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.config.import=optional:file:.env[.properties]

spring.security.debug=true
logging.level.org.springframework.security=DEBUG
server.error.include-stacktrace=always